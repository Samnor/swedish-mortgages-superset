name: Deploy Superset

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment environment
        required: true
        default: dev
        type: choice
        options:
          - dev
          - prod

concurrency:
  group: superset-${{ inputs.environment || (github.ref_name == 'main' && 'prod' || 'dev') }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.env.outputs.environment }}
    steps:
      - id: env
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            DEPLOY_ENV="${{ inputs.environment }}"
          elif [ "${{ github.ref_name }}" = "main" ]; then
            DEPLOY_ENV="prod"
          else
            DEPLOY_ENV="dev"
          fi
          echo "environment=$DEPLOY_ENV" >> "$GITHUB_OUTPUT"

  deploy:
    needs: resolve
    runs-on: ubuntu-latest
    environment: ${{ needs.resolve.outputs.environment }}
    env:
      AWS_REGION: ${{ vars.AWS_REGION || vars.AWS_DEFAULT_REGION || 'eu-north-1' }}
      AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}
      ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
      ECS_CLUSTER: ${{ vars.ECS_CLUSTER }}
      ECS_SERVICE: ${{ vars.ECS_SERVICE }}
      ECS_TASK_FAMILY: ${{ vars.ECS_TASK_FAMILY }}
      ECS_EXECUTION_ROLE_ARN: ${{ vars.ECS_EXECUTION_ROLE_ARN }}
      ECS_TASK_ROLE_ARN: ${{ vars.ECS_TASK_ROLE_ARN }}
      ECS_LOG_GROUP: ${{ vars.ECS_LOG_GROUP }}
      SUPERSET_PORT: ${{ vars.SUPERSET_PORT || '8088' }}
      SUPERSET_DATABASE_NAME: ${{ vars.SUPERSET_DATABASE_NAME || 'Athena Swedish Mortgages' }}
      SUPERSET_ADMIN_USERNAME: ${{ vars.SUPERSET_ADMIN_USERNAME || 'admin' }}
      SUPERSET_ADMIN_FIRSTNAME: ${{ vars.SUPERSET_ADMIN_FIRSTNAME || 'Superset' }}
      SUPERSET_ADMIN_LASTNAME: ${{ vars.SUPERSET_ADMIN_LASTNAME || 'Admin' }}
      SUPERSET_ADMIN_EMAIL: ${{ vars.SUPERSET_ADMIN_EMAIL || 'admin@example.com' }}
      ATHENA_REGION: ${{ vars.ATHENA_REGION || vars.AWS_DEFAULT_REGION || 'eu-north-1' }}
      ATHENA_DATABASE: ${{ vars.ATHENA_DATABASE || vars.ATHENA_SCHEMA }}
      ATHENA_SCHEMA: ${{ vars.ATHENA_SCHEMA }}
      ATHENA_WORK_GROUP: ${{ vars.ATHENA_WORK_GROUP || 'primary' }}
      ATHENA_S3_STAGING_DIR: ${{ vars.ATHENA_S3_STAGING_DIR }}
      TAILSCALE_BASE_URL: ${{ vars.TAILSCALE_BASE_URL }}
      SUPERSET_SECRET_KEY_SECRET_ARN: ${{ vars.SUPERSET_SECRET_KEY_SECRET_ARN }}
      SUPERSET_ADMIN_PASSWORD_SECRET_ARN: ${{ vars.SUPERSET_ADMIN_PASSWORD_SECRET_ARN }}
      SUPERSET_DATABASE_URI_SECRET_ARN: ${{ vars.SUPERSET_DATABASE_URI_SECRET_ARN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check ECS deployment configuration
        id: preflight
        run: |
          missing=0
          for name in AWS_ROLE_ARN ECR_REPOSITORY ECS_CLUSTER ECS_SERVICE ECS_TASK_FAMILY ECS_EXECUTION_ROLE_ARN ECS_TASK_ROLE_ARN ECS_LOG_GROUP ATHENA_SCHEMA ATHENA_S3_STAGING_DIR SUPERSET_SECRET_KEY_SECRET_ARN SUPERSET_ADMIN_PASSWORD_SECRET_ARN SUPERSET_DATABASE_URI_SECRET_ARN; do
            if [ -z "${!name:-}" ]; then
              echo "Missing $name; deployment will be skipped."
              missing=1
            fi
          done
          if [ "$missing" -eq 1 ]; then
            echo "deploy_ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "deploy_ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure AWS credentials
        if: steps.preflight.outputs.deploy_ready == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        if: steps.preflight.outputs.deploy_ready == 'true'
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        if: steps.preflight.outputs.deploy_ready == 'true'
        env:
          IMAGE_TAG: ${{ needs.resolve.outputs.environment }}-${{ github.sha }}
        run: |
          IMAGE_URI="${{ steps.ecr.outputs.registry }}/${ECR_REPOSITORY}:${IMAGE_TAG}"
          docker build -t "$IMAGE_URI" .
          docker push "$IMAGE_URI"
          echo "IMAGE_URI=$IMAGE_URI" >> "$GITHUB_ENV"

      - name: Render ECS task definition
        if: steps.preflight.outputs.deploy_ready == 'true'
        run: python scripts/render_task_definition.py aws/ecs-task-definition.template.json target/ecs-task-definition.json

      - name: Deploy ECS service
        if: steps.preflight.outputs.deploy_ready == 'true'
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: target/ecs-task-definition.json
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
